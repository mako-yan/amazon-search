<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Amazon かんたん検索ツール</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f7f8fa;
    --white: #ffffff;
    --text-primary: #1a1a2e;
    --text-secondary: #6b7280;
    --border: #e5e7eb;
    --accent: #ff6b00;
    --accent-light: #fff4ec;
    --accent-hover: #e55e00;
    --prime: #00a8e0;
    --prime-light: #e8f6fd;
    --success: #10b981;
    --shadow-sm: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
    --shadow-md: 0 4px 16px rgba(0,0,0,0.08);
    --shadow-lg: 0 8px 32px rgba(0,0,0,0.10);
    --radius: 14px;
    --radius-sm: 8px;
  }

  body {
    font-family: 'Noto Sans JP', 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    min-height: 100vh;
    padding: 0 0 60px;
  }

  /* Header */
  header {
    background: var(--white);
    border-bottom: 1px solid var(--border);
    padding: 18px 24px;
    display: flex;
    align-items: center;
    gap: 12px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: var(--shadow-sm);
  }
  .logo-icon {
    width: 36px; height: 36px;
    background: var(--accent);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }
  .logo-text { font-size: 17px; font-weight: 700; letter-spacing: -0.3px; }
  .logo-sub { font-size: 11px; color: var(--text-secondary); font-weight: 400; margin-top: 1px; }

  /* Main */
  main { max-width: 680px; margin: 0 auto; padding: 28px 16px 0; }

  /* Section card */
  .card {
    background: var(--white);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    padding: 24px;
    margin-bottom: 16px;
    box-shadow: var(--shadow-sm);
    transition: box-shadow 0.2s;
  }
  .card:focus-within { box-shadow: var(--shadow-md); }

  .section-label {
    font-size: 12px;
    font-weight: 700;
    color: var(--text-secondary);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .section-label .dot {
    width: 6px; height: 6px;
    background: var(--accent);
    border-radius: 50%;
    display: inline-block;
  }

  /* Keyword input */
  .keyword-wrapper { position: relative; }
  .keyword-input {
    width: 100%;
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 13px 48px 13px 16px;
    font-size: 16px;
    font-family: inherit;
    color: var(--text-primary);
    background: var(--bg);
    transition: border-color 0.2s, background 0.2s;
    outline: none;
  }
  .keyword-input:focus {
    border-color: var(--accent);
    background: var(--white);
  }
  .keyword-input::placeholder { color: #b0b8c1; }
  .keyword-clear {
    position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
    background: none; border: none; cursor: pointer;
    color: var(--text-secondary); font-size: 18px; line-height: 1;
    display: none; padding: 2px;
  }
  .keyword-input:not(:placeholder-shown) ~ .keyword-clear { display: block; }

  /* Multi keyword */
  .multi-keyword-toggle {
    display: flex; align-items: center; gap: 8px;
    margin-top: 10px; cursor: pointer;
    font-size: 13px; color: var(--accent); font-weight: 500;
    width: fit-content;
  }
  .multi-keyword-toggle svg { transition: transform 0.2s; }
  .multi-keyword-toggle.open svg { transform: rotate(180deg); }
  .multi-keywords-area {
    display: none;
    margin-top: 12px;
    background: var(--accent-light);
    border-radius: var(--radius-sm);
    padding: 14px;
  }
  .multi-keywords-area.open { display: block; }
  .multi-keywords-area p {
    font-size: 12px; color: var(--text-secondary); margin-bottom: 10px;
  }
  .keyword-tags { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 10px; }
  .keyword-tag {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 5px 12px;
    font-size: 13px;
    display: flex; align-items: center; gap: 6px;
    color: var(--text-primary);
  }
  .keyword-tag .remove-tag {
    cursor: pointer; color: var(--text-secondary);
    font-size: 15px; line-height: 1;
    background: none; border: none;
  }
  .multi-add-row { display: flex; gap: 8px; }
  .multi-add-input {
    flex: 1;
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 9px 12px;
    font-size: 14px;
    font-family: inherit;
    outline: none;
    background: var(--white);
  }
  .multi-add-input:focus { border-color: var(--accent); }
  .multi-add-btn {
    background: var(--accent); color: white;
    border: none; border-radius: var(--radius-sm);
    padding: 9px 16px; font-size: 13px; font-weight: 600;
    cursor: pointer; white-space: nowrap; font-family: inherit;
  }
  .multi-add-btn:hover { background: var(--accent-hover); }

  /* Price range */
  .price-row { display: flex; align-items: center; gap: 10px; }
  .price-input-wrap { flex: 1; position: relative; }
  .price-input-wrap span {
    position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
    color: var(--text-secondary); font-size: 14px; font-weight: 500;
  }
  .price-input {
    width: 100%;
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 12px 12px 12px 26px;
    font-size: 15px;
    font-family: inherit;
    color: var(--text-primary);
    background: var(--bg);
    outline: none;
    transition: border-color 0.2s, background 0.2s;
    -moz-appearance: textfield;
  }
  .price-input::-webkit-outer-spin-button,
  .price-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  .price-input:focus { border-color: var(--accent); background: var(--white); }
  .price-sep { color: var(--text-secondary); font-size: 14px; flex-shrink: 0; }

  /* Category */
  .category-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
  @media (max-width: 400px) { .category-grid { grid-template-columns: repeat(2, 1fr); } }
  .category-btn {
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 10px 8px;
    font-size: 12px;
    font-family: inherit;
    color: var(--text-secondary);
    background: var(--white);
    cursor: pointer;
    text-align: center;
    transition: all 0.15s;
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    font-weight: 500;
  }
  .category-btn .cat-icon { font-size: 20px; }
  .category-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }
  .category-btn.active { border-color: var(--accent); color: var(--accent); background: var(--accent-light); font-weight: 700; }

  /* Toggle options */
  .toggle-list { display: flex; flex-direction: column; gap: 12px; }
  .toggle-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 14px;
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: all 0.15s;
    background: var(--white);
  }
  .toggle-item:hover { border-color: var(--accent); background: var(--accent-light); }
  .toggle-item.active { border-color: var(--accent); background: var(--accent-light); }
  .toggle-item.prime-item:hover, .toggle-item.prime-item.active {
    border-color: var(--prime); background: var(--prime-light);
  }
  .toggle-info { display: flex; align-items: center; gap: 10px; }
  .toggle-icon { font-size: 20px; }
  .toggle-label { font-size: 14px; font-weight: 500; }
  .toggle-desc { font-size: 11px; color: var(--text-secondary); margin-top: 1px; }
  .toggle-switch {
    width: 42px; height: 24px;
    background: var(--border);
    border-radius: 12px;
    position: relative;
    transition: background 0.2s;
    flex-shrink: 0;
  }
  .toggle-switch::after {
    content: '';
    width: 18px; height: 18px;
    background: white;
    border-radius: 50%;
    position: absolute;
    top: 3px; left: 3px;
    transition: transform 0.2s;
    box-shadow: 0 1px 4px rgba(0,0,0,0.2);
  }
  .toggle-item.active .toggle-switch { background: var(--accent); }
  .toggle-item.prime-item.active .toggle-switch { background: var(--prime); }
  .toggle-item.active .toggle-switch::after { transform: translateX(18px); }

  /* Rating select */
  .rating-row { display: flex; gap: 8px; margin-top: 12px; }
  .rating-btn {
    flex: 1;
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 9px 6px;
    font-size: 12px;
    font-family: inherit;
    background: var(--white);
    cursor: pointer;
    text-align: center;
    color: var(--text-secondary);
    transition: all 0.15s;
    font-weight: 500;
  }
  .rating-btn:hover { border-color: #f59e0b; background: #fffbeb; color: #92400e; }
  .rating-btn.active { border-color: #f59e0b; background: #fffbeb; color: #92400e; font-weight: 700; }

  /* Discount input */
  .discount-row {
    display: none;
    margin-top: 12px;
    align-items: center;
    gap: 10px;
  }
  .discount-row.show { display: flex; }
  .discount-input {
    width: 80px;
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 9px 12px;
    font-size: 15px;
    font-family: inherit;
    outline: none;
    background: var(--bg);
    transition: border-color 0.2s;
    -moz-appearance: textfield;
    text-align: center;
  }
  .discount-input::-webkit-outer-spin-button,
  .discount-input::-webkit-inner-spin-button { -webkit-appearance: none; }
  .discount-input:focus { border-color: var(--accent); background: var(--white); }
  .discount-label { font-size: 14px; color: var(--text-secondary); }

  /* Sort */
  .sort-row { display: flex; gap: 8px; flex-wrap: wrap; }
  .sort-btn {
    border: 1.5px solid var(--border);
    border-radius: 20px;
    padding: 7px 14px;
    font-size: 12px;
    font-family: inherit;
    background: var(--white);
    cursor: pointer;
    color: var(--text-secondary);
    transition: all 0.15s;
    font-weight: 500;
  }
  .sort-btn:hover { border-color: var(--accent); color: var(--accent); }
  .sort-btn.active { border-color: var(--accent); background: var(--accent-light); color: var(--accent); font-weight: 700; }

  /* Search button */
  .search-btn-wrap { padding: 0 0 8px; }
  .search-btn {
    width: 100%;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: var(--radius);
    padding: 17px;
    font-size: 17px;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    letter-spacing: 0.02em;
    transition: background 0.2s, transform 0.1s, box-shadow 0.2s;
    box-shadow: 0 4px 16px rgba(255,107,0,0.3);
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .search-btn:hover { background: var(--accent-hover); box-shadow: 0 6px 20px rgba(255,107,0,0.4); }
  .search-btn:active { transform: scale(0.98); }
  .search-btn:disabled { background: #d1d5db; box-shadow: none; cursor: not-allowed; }

  /* Multi search results */
  .multi-results { display: none; }
  .multi-results.show { display: block; }
  .multi-results-title {
    font-size: 13px; font-weight: 700; color: var(--text-secondary);
    margin-bottom: 10px; letter-spacing: 0.05em; text-transform: uppercase;
  }
  .result-links { display: flex; flex-direction: column; gap: 8px; }
  .result-link {
    display: flex; align-items: center; justify-content: space-between;
    background: var(--white);
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 13px 16px;
    text-decoration: none;
    color: var(--text-primary);
    font-size: 14px;
    font-weight: 500;
    transition: all 0.15s;
    box-shadow: var(--shadow-sm);
  }
  .result-link:hover { border-color: var(--accent); background: var(--accent-light); }
  .result-link-kw { display: flex; align-items: center; gap: 8px; }
  .result-link-kw .kw-badge {
    background: var(--accent); color: white;
    border-radius: 4px; padding: 2px 8px; font-size: 12px; font-weight: 700;
  }
  .result-link svg { color: var(--accent); flex-shrink: 0; }

  /* URL preview */
  .url-preview {
    display: none;
    margin-top: 12px;
  }
  .url-preview.show { display: block; }
  .url-preview-box {
    background: #f0f9ff;
    border: 1px solid #bae6fd;
    border-radius: var(--radius-sm);
    padding: 10px 14px;
    font-size: 11px;
    color: #0369a1;
    word-break: break-all;
    font-family: 'DM Mono', monospace;
    line-height: 1.5;
  }

  /* Alert banner (future feature) */
  .alert-banner {
    background: linear-gradient(135deg, #f0fdf4, #dcfce7);
    border: 1px solid #86efac;
    border-radius: var(--radius-sm);
    padding: 14px 16px;
    display: flex; align-items: flex-start; gap: 10px;
    margin-top: 4px;
  }
  .alert-banner-icon { font-size: 20px; flex-shrink: 0; }
  .alert-banner-text { font-size: 13px; color: #166534; line-height: 1.5; }
  .alert-banner-text strong { font-weight: 700; display: block; margin-bottom: 2px; }

  /* Reset */
  .reset-btn {
    background: none; border: none; cursor: pointer;
    font-size: 13px; color: var(--text-secondary);
    font-family: inherit; display: flex; align-items: center; gap: 4px;
    margin: 0 auto 8px;
    padding: 6px 12px;
    border-radius: 20px;
    transition: all 0.15s;
  }
  .reset-btn:hover { background: var(--border); color: var(--text-primary); }

  /* Responsive */
  @media (min-width: 480px) {
    main { padding: 32px 24px 0; }
  }
</style>
</head>
<body>

<header>
  <div class="logo-icon">🛒</div>
  <div>
    <div class="logo-text">Amazon かんたん検索</div>
    <div class="logo-sub">条件を設定してAmazonで商品を探す</div>
  </div>
</header>

<main>

  <!-- キーワード -->
  <div class="card">
    <div class="section-label"><span class="dot"></span>キーワード</div>
    <div class="keyword-wrapper">
      <input class="keyword-input" id="mainKeyword" type="text" placeholder="例：キャンプ用品、テント、ワイヤレスイヤホン">
      <button class="keyword-clear" onclick="clearMainKeyword()">✕</button>
    </div>
    <div class="multi-keyword-toggle" id="multiToggle" onclick="toggleMulti()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
      複数キーワードを一括検索する
    </div>
    <div class="multi-keywords-area" id="multiArea">
      <p>キーワードを複数追加すると、すべてを組み合わせた1つの検索リンクを生成します。</p>
      <div class="keyword-tags" id="keywordTags"></div>
      <div class="multi-add-row">
        <input class="multi-add-input" id="multiInput" type="text" placeholder="キーワードを入力...">
        <button class="multi-add-btn" onclick="addKeyword()">追加</button>
      </div>
    </div>
  </div>

  <!-- 価格帯 -->
  <div class="card">
    <div class="section-label"><span class="dot"></span>価格帯</div>
    <div class="price-row">
      <div class="price-input-wrap">
        <span>¥</span>
        <input class="price-input" id="minPrice" type="number" placeholder="下限なし" min="0">
      </div>
      <span class="price-sep">〜</span>
      <div class="price-input-wrap">
        <span>¥</span>
        <input class="price-input" id="maxPrice" type="number" placeholder="上限なし" min="0">
      </div>
    </div>
  </div>

  <!-- カテゴリ -->
  <div class="card">
    <div class="section-label"><span class="dot"></span>カテゴリ</div>
    <div class="category-grid" id="categoryGrid">
      <button class="category-btn active" data-cat="" onclick="selectCategory(this)">
        <span class="cat-icon">🔍</span>すべて
      </button>
      <button class="category-btn" data-cat="electronics" onclick="selectCategory(this)">
        <span class="cat-icon">📱</span>家電・PC
      </button>
      <button class="category-btn" data-cat="apparel" onclick="selectCategory(this)">
        <span class="cat-icon">👕</span>ファッション
      </button>
      <button class="category-btn" data-cat="kitchen" onclick="selectCategory(this)">
        <span class="cat-icon">🍳</span>キッチン
      </button>
      <button class="category-btn" data-cat="sporting" onclick="selectCategory(this)">
        <span class="cat-icon">⚽</span>スポーツ
      </button>
      <button class="category-btn" data-cat="beauty" onclick="selectCategory(this)">
        <span class="cat-icon">💄</span>コスメ
      </button>
      <button class="category-btn" data-cat="toys" onclick="selectCategory(this)">
        <span class="cat-icon">🧸</span>おもちゃ
      </button>
      <button class="category-btn" data-cat="books" onclick="selectCategory(this)">
        <span class="cat-icon">📚</span>本・雑誌
      </button>
      <button class="category-btn" data-cat="food-beverage" onclick="selectCategory(this)">
        <span class="cat-icon">🍱</span>食品
      </button>
    </div>
  </div>

  <!-- 絞り込みオプション -->
  <div class="card">
    <div class="section-label"><span class="dot"></span>絞り込みオプション</div>
    <div class="toggle-list">
      <div class="toggle-item" id="saleToggle" onclick="toggleOption('sale')">
        <div class="toggle-info">
          <span class="toggle-icon">🏷️</span>
          <div>
            <div class="toggle-label">セール・割引品のみ</div>
            <div class="toggle-desc">割引のある商品だけを表示</div>
          </div>
        </div>
        <div class="toggle-switch"></div>
      </div>
      <div class="discount-row" id="discountRow">
        <input class="discount-input" id="discountInput" type="number" value="10" min="1" max="99" placeholder="10">
        <span class="discount-label">% 以上の割引</span>
      </div>
      <div class="toggle-item prime-item" id="primeToggle" onclick="toggleOption('prime')">
        <div class="toggle-info">
          <span class="toggle-icon">⚡</span>
          <div>
            <div class="toggle-label">Prime 送料無料のみ</div>
            <div class="toggle-desc">Prime対象商品に絞り込む</div>
          </div>
        </div>
        <div class="toggle-switch"></div>
      </div>
    </div>

    <!-- 評価 -->
    <div style="margin-top: 18px;">
      <div class="section-label" style="margin-bottom: 10px;"><span class="dot"></span>最低評価</div>
      <div class="rating-row" id="ratingRow">
        <button class="rating-btn active" data-rating="" onclick="selectRating(this)">指定なし</button>
        <button class="rating-btn" data-rating="4" onclick="selectRating(this)">★4以上</button>
        <button class="rating-btn" data-rating="3" onclick="selectRating(this)">★3以上</button>
        <button class="rating-btn" data-rating="2" onclick="selectRating(this)">★2以上</button>
      </div>
    </div>
  </div>

  <!-- 並び替え -->
  <div class="card">
    <div class="section-label"><span class="dot"></span>並び替え</div>
    <div class="sort-row" id="sortRow">
      <button class="sort-btn active" data-sort="" onclick="selectSort(this)">関連度順</button>
      <button class="sort-btn" data-sort="price-asc-rank" onclick="selectSort(this)">価格の安い順</button>
      <button class="sort-btn" data-sort="price-desc-rank" onclick="selectSort(this)">価格の高い順</button>
      <button class="sort-btn" data-sort="review-rank" onclick="selectSort(this)">レビューの多い順</button>
      <button class="sort-btn" data-sort="date-desc-rank" onclick="selectSort(this)">新着順</button>
    </div>
  </div>

  <!-- 検索ボタン -->
  <div class="search-btn-wrap">
    <button class="search-btn" id="searchBtn" onclick="doSearch()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      Amazonで検索する
    </button>
  </div>

  <!-- リセット -->
  <button class="reset-btn" onclick="resetAll()">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
    条件をリセット
  </button>

  <!-- 複数キーワード結果 -->
  <div class="multi-results" id="multiResults">
    <div class="multi-results-title">🔗 生成されたリンク一覧</div>
    <div class="result-links" id="resultLinks"></div>
  </div>

  <!-- URL プレビュー（通常検索） -->
  <div class="url-preview" id="urlPreview">
    <div class="multi-results-title">🔗 生成されたURL</div>
    <div class="url-preview-box" id="urlPreviewBox"></div>
  </div>

  <!-- 将来機能：アラート予告 -->
  <div class="alert-banner" style="margin-top: 16px;">
    <span class="alert-banner-icon">🔔</span>
    <div class="alert-banner-text">
      <strong>価格アラート機能（近日公開予定）</strong>
      気になった商品の価格が下がったらお知らせする機能を準備中です。
    </div>
  </div>

</main>

<script>
  // --- State ---
  let selectedCategory = '';
  let saleEnabled = false;
  let primeEnabled = false;
  let selectedRating = '';
  let selectedSort = '';
  let multiKeywords = [];

  // --- Main keyword clear ---
  function clearMainKeyword() {
    document.getElementById('mainKeyword').value = '';
    document.getElementById('mainKeyword').focus();
  }

  // --- Multi keyword toggle ---
  function toggleMulti() {
    const toggle = document.getElementById('multiToggle');
    const area = document.getElementById('multiArea');
    toggle.classList.toggle('open');
    area.classList.toggle('open');
  }

  function addKeyword() {
    const input = document.getElementById('multiInput');
    const kw = input.value.trim();
    if (!kw || multiKeywords.includes(kw)) { input.focus(); return; }
    multiKeywords.push(kw);
    renderTags();
    input.value = '';
    input.focus();
  }

  document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('multiInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') addKeyword();
    });
  });

  function renderTags() {
    const container = document.getElementById('keywordTags');
    container.innerHTML = multiKeywords.map((kw, i) =>
      `<span class="keyword-tag">${kw}<button class="remove-tag" onclick="removeTag(${i})">✕</button></span>`
    ).join('');
  }

  function removeTag(i) {
    multiKeywords.splice(i, 1);
    renderTags();
  }

  // --- Category ---
  function selectCategory(btn) {
    document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selectedCategory = btn.dataset.cat;
  }

  // --- Toggle options ---
  function toggleOption(type) {
    if (type === 'sale') {
      saleEnabled = !saleEnabled;
      document.getElementById('saleToggle').classList.toggle('active', saleEnabled);
      document.getElementById('discountRow').classList.toggle('show', saleEnabled);
    } else if (type === 'prime') {
      primeEnabled = !primeEnabled;
      document.getElementById('primeToggle').classList.toggle('active', primeEnabled);
    }
  }

  // --- Rating ---
  function selectRating(btn) {
    document.querySelectorAll('.rating-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selectedRating = btn.dataset.rating;
  }

  // --- Sort ---
  function selectSort(btn) {
    document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selectedSort = btn.dataset.sort;
  }

  // --- URL generation ---
  function generateUrl(keyword) {
    let url = 'https://www.amazon.co.jp/s?k=' + encodeURIComponent(keyword);
    if (selectedCategory) url += '&i=' + selectedCategory;
    const minP = document.getElementById('minPrice').value;
    const maxP = document.getElementById('maxPrice').value;
    if (minP) url += '&low-price=' + minP;
    if (maxP) url += '&high-price=' + maxP;
    if (saleEnabled) {
      const pct = document.getElementById('discountInput').value || '1';
      url += '&pct-off=' + pct + '-';
    }
    if (primeEnabled) url += '&prime=1';
    if (selectedRating) url += '&ratingStarRank=' + selectedRating;
    if (selectedSort) url += '&s=' + selectedSort;
    return url;
  }

  // --- Search ---
  function doSearch() {
    const isMultiOpen = document.getElementById('multiArea').classList.contains('open');

    if (isMultiOpen && multiKeywords.length > 0) {
      // Multi keyword mode: combine all keywords into one search
      const combinedKeyword = multiKeywords.join(' ');
      const url = generateUrl(combinedKeyword);
      const container = document.getElementById('resultLinks');
      container.innerHTML = `<a class="result-link" href="${url}" target="_blank" rel="noopener">
        <div class="result-link-kw">
          <span class="kw-badge">検索</span>
          <span>${escapeHtml(combinedKeyword)}</span>
        </div>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
      </a>`;
      document.getElementById('multiResults').classList.add('show');
      document.getElementById('urlPreview').classList.remove('show');
      document.getElementById('multiResults').scrollIntoView({ behavior: 'smooth', block: 'start' });
    } else {
      // Single keyword mode
      const kw = document.getElementById('mainKeyword').value.trim();
      if (!kw) {
        document.getElementById('mainKeyword').focus();
        document.getElementById('mainKeyword').style.borderColor = 'var(--accent)';
        setTimeout(() => document.getElementById('mainKeyword').style.borderColor = '', 1500);
        return;
      }
      const url = generateUrl(kw);
      document.getElementById('urlPreviewBox').textContent = url;
      document.getElementById('urlPreview').classList.add('show');
      document.getElementById('multiResults').classList.remove('show');
      window.open(url, '_blank', 'noopener');
    }
  }

  function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // --- Reset ---
  function resetAll() {
    document.getElementById('mainKeyword').value = '';
    document.getElementById('minPrice').value = '';
    document.getElementById('maxPrice').value = '';
    selectedCategory = '';
    saleEnabled = false;
    primeEnabled = false;
    selectedRating = '';
    selectedSort = '';
    multiKeywords = [];
    renderTags();
    document.getElementById('multiArea').classList.remove('open');
    document.getElementById('multiToggle').classList.remove('open');
    document.querySelectorAll('.category-btn').forEach((b,i) => b.classList.toggle('active', i===0));
    document.getElementById('saleToggle').classList.remove('active');
    document.getElementById('primeToggle').classList.remove('active');
    document.getElementById('discountRow').classList.remove('show');
    document.getElementById('discountInput').value = '10';
    document.querySelectorAll('.rating-btn').forEach((b,i) => b.classList.toggle('active', i===0));
    document.querySelectorAll('.sort-btn').forEach((b,i) => b.classList.toggle('active', i===0));
    document.getElementById('multiResults').classList.remove('show');
    document.getElementById('urlPreview').classList.remove('show');
  }
</script>
</body>
</html>
